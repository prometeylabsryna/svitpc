services:
  nginx:
    build:
      context: .
      dockerfile: ./deploy/nginx/Dockerfile
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/docker.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      # service_started (НЕ service_healthy): backend healthcheck має
      # start_period 15 хв (довгі міграції), і якщо `up` переривається до
      # healthy — nginx взагалі не створюється і сайт повністю недоступний.
      # Хай nginx стартує одразу і віддає 502 кілька хвилин, поки backend мігрує.
      backend:
        condition: service_started

  backend:
    restart: always
    env_file:
      - .env

  celery_worker:
    restart: always
    env_file:
      - .env

  celery_worker_priority:
    restart: always
    env_file:
      - .env

  celery_worker_light:
    restart: always
    env_file:
      - .env

  celery_beat:
    restart: always
    env_file:
      - .env

  db:
    restart: always

  redis:
    restart: always
