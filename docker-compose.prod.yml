services:
  nginx:
    build:
      context: .
      dockerfile: ./deploy/nginx/Dockerfile
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/docker.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      backend:
        condition: service_healthy

  backend:
    restart: always
    env_file:
      - .env

  celery_worker:
    restart: always
    env_file:
      - .env

  celery_beat:
    restart: always
    env_file:
      - .env

  db:
    restart: always

  redis:
    restart: always
