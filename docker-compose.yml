services:
  backend:
    build:
      context: .
      dockerfile: ./deploy/backend/Dockerfile
    command: >-
      sh -c "python scripts/build_css_bundle.py
      && python manage.py check --deploy
      && python manage.py migrate --noinput
      && python manage.py collectstatic --noinput
      && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-2} --timeout 120"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./data:/app/data:ro
      - ./ТЗ:/app/ТЗ:ro
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      # 15 хв: міграції з data-backfill (напр. catalog 0020/0021) на 1vCPU/2GB
      # тривають довше за старі 90с — інакше nginx падає з "dependency unhealthy",
      # хоча міграція нормально працює у фоні.
      start_period: 900s

  celery_worker:
    build:
      context: .
      dockerfile: ./deploy/backend/Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-1} --max-memory-per-child=400000 -Q celery
    # Важкі синки (Brain/Kancmaster) не повинні конкурувати з вебзапитами за CPU:
    # без ліміту сплеск backfill-задач забирав ціле ядро і TTFB сайту падав до 8с+.
    cpus: 0.75
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      # Ловить "завислий" воркер (процес живий, але не відповідає на ping).
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$(hostname) -t 10 | grep -q pong"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 120s

  celery_worker_light:
    build:
      context: .
      dockerfile: ./deploy/backend/Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=1 --max-memory-per-child=200000 -Q light
    cpus: 0.5
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$(hostname) -t 10 | grep -q pong"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 120s

  celery_worker_priority:
    build:
      context: .
      dockerfile: ./deploy/backend/Dockerfile
    # Без CPU-ліміту: ТТН і сповіщення про замовлення мають виконуватись одразу.
    command: celery -A config worker --loglevel=info --concurrency=1 -Q priority
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$(hostname) -t 10 | grep -q pong"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 120s

  celery_beat:
    build:
      context: .
      dockerfile: ./deploy/backend/Dockerfile
    command: celery -A config beat --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      # Beat не відповідає на inspect ping — перевіряємо, що процес планувальника живий.
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null || exit 1"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-svitpc}
      POSTGRES_USER: ${POSTGRES_USER:-svitpc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svitpc}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
