services:
  backend:
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.develop
    command: python manage.py runserver 0.0.0.0:8000

  db:
    env_file:
      - .env
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  celery_worker:
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.develop

  celery_beat:
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.develop
