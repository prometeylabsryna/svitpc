{% load i18n %}
{% if user.is_authenticated %}
<a href="{% url 'customers:dashboard' %}" class="header-action" aria-label="{{ user.get_short_name|default:user.email }}">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"/>
  </svg>
  <span class="header-action__label">{{ user.get_short_name|default:_("Кабінет") }}</span>
</a>
{% else %}
<a href="{% url 'customers:login' %}" class="header-action" aria-label="{% trans 'Увійти' %}">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
  </svg>
  <span class="header-action__label">{% trans "Увійти" %}</span>
</a>
{% endif %}
