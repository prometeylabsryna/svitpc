{% load i18n %}
<div class="form-field">
  <label class="form-label" for="{{ field_id }}">{{ label }}{% if required %} *{% endif %}</label>
  <div class="form-password">
    <input
      class="form-input form-password__input{% if invalid %} is-invalid{% endif %}"
      id="{{ field_id }}"
      name="{{ field_name }}"
      type="password"
      {% if minlength %}minlength="{{ minlength }}"{% endif %}
      autocomplete="{{ autocomplete|default:'new-password' }}"
      {% if required %}required{% endif %}>
    <div class="form-password__suffix">
      <button
        type="button"
        class="form-password__toggle"
        data-password-toggle
        data-label-show="{% trans 'Показати пароль' %}"
        data-label-hide="{% trans 'Приховати пароль' %}"
        aria-label="{% trans 'Показати пароль' %}"
        aria-pressed="false">
        <svg class="form-password__icon form-password__icon--show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg class="form-password__icon form-password__icon--hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
          <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
          <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
          <line x1="2" x2="22" y1="2" y2="22"/>
        </svg>
      </button>
    </div>
  </div>
  {% if hint %}<p class="form-hint">{{ hint }}</p>{% endif %}
  {% for error in errors %}<span class="form-error">{{ error }}</span>{% endfor %}
</div>
