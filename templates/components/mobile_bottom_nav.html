{% load i18n %}

<nav class="mobile-bottom-nav" aria-label="{% trans 'Швидка навігація' %}">

  <a href="{% url 'catalog:home' %}"
     class="mobile-bottom-nav__item{% if request.resolver_match.url_name == 'home' %} is-active{% endif %}"
     aria-label="{% trans 'Головна' %}">
    <span class="mobile-bottom-nav__icon-wrap">
      <svg class="mobile-bottom-nav__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9.5Z"/>
      </svg>
    </span>
    <span>{% trans "Головна" %}</span>
  </a>

  <button class="mobile-bottom-nav__item" data-menu-open aria-label="{% trans 'Каталог' %}" aria-expanded="false">
    <span class="mobile-bottom-nav__icon-wrap">
      <svg class="mobile-bottom-nav__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16"/>
      </svg>
    </span>
    <span>{% trans "Каталог" %}</span>
  </button>

  <a href="{% url 'cart:detail' %}"
     class="mobile-bottom-nav__item{% if request.resolver_match.url_name == 'detail' and request.resolver_match.app_name == 'cart' %} is-active{% endif %}"
     aria-label="{% trans 'Кошик' %}">
    <span class="mobile-bottom-nav__icon-wrap">
      <svg class="mobile-bottom-nav__icon mobile-bottom-nav__icon--cart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 18a1.75 1.75 0 1 0 0 3.5 1.75 1.75 0 0 0 0-3.5Zm9 0a1.75 1.75 0 1 0 0 3.5 1.75 1.75 0 0 0 0-3.5ZM6.2 6h13.1l-1.4 7.2a1 1 0 0 1-.98.8H8.05a1 1 0 0 1-.98-.8L5.1 6H3.5a.75.75 0 0 1 0-1.5h1.2l.5-2.5A.75.75 0 0 1 6 1h12a.75.75 0 0 1 .74.6l.5 2.5h1.26a.75.75 0 0 1 0 1.5H6.2Z"/>
      </svg>
      <span class="mobile-bottom-nav__badge" data-cart-count{% if not cart_count %} hidden{% endif %}>{{ cart_count }}</span>
    </span>
    <span>{% trans "Кошик" %}</span>
  </a>

  {% if request.user.is_authenticated %}
  <a href="{% url 'customers:dashboard' %}"
     class="mobile-bottom-nav__item{% if 'customers' in request.resolver_match.app_name %} is-active{% endif %}"
     aria-label="{% trans 'Кабінет' %}">
    <span class="mobile-bottom-nav__icon-wrap">
      <svg class="mobile-bottom-nav__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="3.5"/>
        <path d="M5 20c0-3.5 3.13-6 7-6s7 2.5 7 6"/>
      </svg>
    </span>
    <span>{% trans "Кабінет" %}</span>
  </a>
  {% else %}
  <a href="{% url 'customers:login' %}"
     class="mobile-bottom-nav__item{% if request.resolver_match.url_name == 'login' %} is-active{% endif %}"
     aria-label="{% trans 'Увійти' %}">
    <span class="mobile-bottom-nav__icon-wrap">
      <svg class="mobile-bottom-nav__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 4H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8"/>
        <path d="M10 12h9m0 0-3-3m3 3-3-3"/>
      </svg>
    </span>
    <span>{% trans "Увійти" %}</span>
  </a>
  {% endif %}

</nav>
