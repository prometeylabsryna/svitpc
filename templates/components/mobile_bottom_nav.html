{% load i18n %}

<nav class="mobile-bottom-nav" aria-label="{% trans 'Швидка навігація' %}">

  <a href="{% url 'catalog:home' %}"
     class="mobile-bottom-nav__item{% if request.resolver_match.url_name == 'home' %} is-active{% endif %}"
     aria-label="{% trans 'Головна' %}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
    </svg>
    <span>{% trans "Головна" %}</span>
  </a>

  <button class="mobile-bottom-nav__item" data-menu-open aria-label="{% trans 'Каталог' %}" aria-expanded="false">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
    </svg>
    <span>{% trans "Каталог" %}</span>
  </button>

  <a href="{% url 'cart:detail' %}"
     class="mobile-bottom-nav__item{% if request.resolver_match.url_name == 'detail' and request.resolver_match.app_name == 'cart' %} is-active{% endif %}"
     aria-label="{% trans 'Кошик' %}">
    <span class="mobile-bottom-nav__badge" data-cart-count hidden>0</span>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/>
    </svg>
    <span>{% trans "Кошик" %}</span>
  </a>

  {% if request.user.is_authenticated %}
  <a href="{% url 'customers:dashboard' %}"
     class="mobile-bottom-nav__item{% if 'customers' in request.resolver_match.app_name %} is-active{% endif %}"
     aria-label="{% trans 'Кабінет' %}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
    </svg>
    <span>{% trans "Кабінет" %}</span>
  </a>
  {% else %}
  <a href="{% url 'customers:login' %}"
     class="mobile-bottom-nav__item{% if request.resolver_match.url_name == 'login' %} is-active{% endif %}"
     aria-label="{% trans 'Увійти' %}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
    </svg>
    <span>{% trans "Увійти" %}</span>
  </a>
  {% endif %}

</nav>
