  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  {% if width %}width="{{ width }}"{% endif %}
  {% if height %}height="{{ height }}"{% endif %}
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
  class="icon-cart{% if class %} {{ class }}{% endif %}"
>

  <circle cx="20" cy="21" r="1"/>
