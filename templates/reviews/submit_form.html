{% load i18n %}

<div class="review-form">
  <h3 class="review-form__title">{% trans "Залишити відгук" %}</h3>
  {% if form_error %}
  <p class="review-form__error" role="alert">{{ form_error }}</p>
  {% endif %}
  <form
    hx-post="{% url 'reviews:submit' product.pk %}"
    hx-target="#reviews-container"
    hx-swap="outerHTML">
    {% csrf_token %}
    <div class="review-form__fields">
      <div class="form-field">
        <label class="form-label" for="review-name">{% trans "Ваше ім'я" %}</label>
        <input class="form-input" id="review-name" name="author_name" type="text" required maxlength="100"
               autocomplete="name">
      </div>
      <div class="form-field">
        <label class="form-label">{% trans "Оцінка" %}</label>
        <div class="review-form__rating" role="radiogroup" aria-label="{% trans 'Оцінка' %}">
          {% for i in "12345" %}
          <label class="review-form__star-label" data-star-value="{{ forloop.counter }}"
                 title="{{ forloop.counter }} {% trans 'зірок' %}">
            <input type="radio" name="rating" value="{{ forloop.counter }}"
                   {% if forloop.counter == 5 %}checked{% endif %}
                   class="sr-only">
            <svg class="review-form__star-icon" xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5z"/>
            </svg>
          </label>
          {% endfor %}
        </div>
      </div>
      <div class="form-field">
        <label class="form-label" for="review-text">{% trans "Ваш відгук" %}</label>
        <textarea class="form-textarea" id="review-text" name="text" required rows="4" maxlength="2000"></textarea>
      </div>
      <button type="submit" class="btn btn--primary">{% trans "Надіслати відгук" %}</button>
      <p class="form-hint">{% trans "Відгук буде опублікований після модерації." %}</p>
    </div>
  </form>
</div>
