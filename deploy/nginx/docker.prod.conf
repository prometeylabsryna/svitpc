# Замініть svitpc.com.ua на ваш домен у server_name та ssl_certificate*
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name svitpc.com.ua www.svitpc.com.ua _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name svitpc.com.ua www.svitpc.com.ua _;
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/svitpc.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/svitpc.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml image/webp;

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/i/[0-9]+\.webp$ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
